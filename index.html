<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaga's Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand:        #0F6E56;
      --brand-light:  #E1F5EE;
      --brand-mid:    #1D9E75;
      --brand-dark:   #085041;
      --accent:       #D85A30;
      --accent-light: #FAECE7;
      --gold:         #BA7517;
      --gold-light:   #FAEEDA;
      --bg:           #F7F6F2;
      --surface:      #FFFFFF;
      --surface2:     #F1EFE8;
      --border:       rgba(0,0,0,0.10);
      --text:         #2C2C2A;
      --text-muted:   #5F5E5A;
      --text-light:   #888780;
      --radius-sm:    8px;
      --radius-md:    12px;
      --radius-lg:    18px;
      --shadow:       0 2px 12px rgba(0,0,0,0.07);
      --shadow-lg:    0 8px 32px rgba(0,0,0,0.10);
      --font-head:    'Syne', sans-serif;
      --font-body:    'DM Sans', sans-serif;
      --nav-h:        56px;
      --mob-nav-h:    60px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    button { cursor: pointer; font-family: var(--font-body); }
    input, select, textarea { font-family: var(--font-body); }
    a { text-decoration: none; color: inherit; }

    /* ===== HEADER ===== */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface); border-bottom: 1px solid var(--border);
      height: var(--nav-h); display: flex; align-items: center; padding: 0 12px; gap: 10px;
    }
    .brand { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .brand-logo {
      width: 32px; height: 32px; background: var(--brand); border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head); font-weight: 800; font-size: 16px; color: #fff;
    }
    .brand-text h1 { font-family: var(--font-head); font-weight: 700; font-size: 14px; color: var(--text); line-height: 1.1; }
    .brand-text p { font-size: 10px; color: var(--text-muted); }
    .header-search { flex: 1; max-width: 380px; position: relative; display: none; }
    .header-search input {
      width: 100%; height: 36px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 999px; padding: 0 16px 0 36px; font-size: 12px; color: var(--text); outline: none;
    }
    .header-search input:focus { border-color: var(--brand); }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-light); }
    .header-nav { display: none; }
    
    .nav-btn {
      background: transparent; border: none; font-size: 13px; font-weight: 600;
      color: var(--text-muted); padding: 6px 12px; border-radius: var(--radius-sm); transition: all 0.2s;
    }
    .nav-btn.active { background: var(--brand-light); color: var(--brand-dark); }
    
    .header-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; flex-shrink: 0; }
    .icon-btn {
      width: 40px; height: 40px; border: 1px solid var(--border); background: var(--surface);
      border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--text-muted); position: relative; transition: background 0.15s;
    }
    .icon-btn:active { background: var(--surface2); }
    .cart-badge {
      position: absolute; top: -4px; right: -4px; background: var(--accent); color: #fff;
      font-size: 9px; font-weight: 600; min-width: 16px; height: 16px; border-radius: 999px;
      display: flex; align-items: center; justify-content: center; padding: 0 3px;
    }
    .lang-select {
      height: 36px; padding: 0 8px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); background: var(--surface); font-size: 11px; color: var(--text-muted); outline: none;
    }
    .login-btn {
      height: 36px; padding: 0 12px; background: var(--brand); color: #fff; border: none;
      border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; transition: background 0.15s;
    }
    .login-btn:active { background: var(--brand-dark); }

    /* ===== MAIN ===== */
    main { flex: 1; padding-bottom: var(--mob-nav-h); }
    .panel { display: none; }
    .panel.active { display: block; }

    /* ===== HERO ===== */
    .hero {
      background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand) 60%, var(--brand-mid) 100%);
      padding: 14px 12px 16px; text-align: center; position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.9); padding: 4px 10px; border-radius: 999px;
      font-size: 10px; font-weight: 500; margin-bottom: 8px; backdrop-filter: blur(4px);
    }
    .hero h2 {
      font-family: var(--font-head); font-size: 20px; font-weight: 700;
      color: #fff; line-height: 1.1; margin-bottom: 4px;
    }
    .hero p { font-size: 12px; color: rgba(255,255,255,0.85); margin: 0 auto 10px; line-height: 1.4; }
    .hero-search { max-width: 100%; margin: 0 0 10px; position: relative; }
    .hero-search input {
      width: 100%; height: 40px; background: #fff; border: none; border-radius: var(--radius-sm);
      padding: 0 95px 0 14px; font-size: 13px; color: var(--text); outline: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .hero-search button {
      position: absolute; right: 4px; top: 4px; height: 32px; padding: 0 12px;
      background: var(--brand); color: #fff; border: none; border-radius: var(--radius-sm);
      font-size: 11px; font-weight: 600; font-family: var(--font-body);
    }
    .hero-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      height: 38px; padding: 0 16px; background: #fff; color: var(--brand-dark);
      border: none; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600;
      font-family: var(--font-body); transition: transform 0.1s;
    }
    .btn-primary:active { transform: scale(0.96); }
    .btn-secondary {
      height: 38px; padding: 0 16px; background: rgba(255,255,255,0.15); color: #fff;
      border: 1px solid rgba(255,255,255,0.3); border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 500; font-family: var(--font-body); backdrop-filter: blur(4px);
    }
    .btn-secondary:active { background: rgba(255,255,255,0.25); }

    /* ===== CATEGORY SCROLL ===== */
    .category-scroll-section {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 0; overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .category-scroll-section::-webkit-scrollbar { display: none; }
    .category-scroll-inner { display: flex; gap: 8px; padding: 0 12px; width: fit-content; }
    .category-chip {
      padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; font-size: 12px; color: var(--text-muted); font-weight: 500;
      cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.15s;
    }
    .category-chip:active { transform: scale(0.94); }
    .category-chip.active { background: var(--brand); color: #fff; border-color: var(--brand); }

    /* ===== SECTIONS ===== */
    .section { padding: 16px 12px; }
