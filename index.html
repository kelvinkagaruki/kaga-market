<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaga's Market</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <header class="site-header">
    <div class="brand">
      <h1 data-i18n="brand-title">Kaga's Market</h1>
      <p data-i18n="brand-subtitle">Marketplace + Delivery Platform</p>
    </div>

    <nav class="nav-links">
      <button id="show-home-btn" class="nav-button active">🏠 <span data-i18n="nav-home">Home</span></button>
      <button id="show-shop-btn" class="nav-button">🛍️ <span data-i18n="nav-shop">Shop</span></button>
      <button id="show-account-btn" class="nav-button">👤 <span data-i18n="nav-account">Account</span></button>
      <button id="show-messenger-btn" class="nav-button">💬 <span data-i18n="nav-messenger">Messenger</span></button>
    </nav>

    <div class="header-search-wrapper">
      <div class="header-search">
        <input id="global-search-input" type="search" placeholder="Search products, shops, orders..." />
      </div>
    </div>

    <div class="header-menu">
      <button id="show-cart-btn" class="nav-button mini-icon">🛒 <span id="cart-count">0</span></button>

      <select id="language-switcher" class="language-switcher">
        <option value="en">English</option>
        <option value="sw">Kiswahili</option>
      </select>

      <button id="account-menu-btn" class="account-btn">👤 Account</button>
    </div>
  </header>

  <main>

    <!-- HOME -->
    <section class="panel" id="home-panel">
      <h2>Welcome to Kaga's Market</h2>
      <button onclick="switchView('shop')">Browse Shop</button>
    </section>

    <!-- SHOP -->
    <section class="panel hidden" id="shop-panel">
      <h2>Shop</h2>
      <div id="product-list"></div>
    </section>

    <!-- CART -->
    <section class="panel hidden" id="cart-panel">
      <h2>Cart</h2>
      <div id="cart-list"></div>
      <strong id="cart-total">TZS 0</strong>
    </section>

    <!-- DELIVERY -->
    <section class="panel hidden" id="delivery-panel">
      <h2>Delivery</h2>
      <form id="delivery-form">
        <input type="text" placeholder="Name" required />
        <input type="text" placeholder="Phone" required />
        <input type="text" placeholder="Address" required />
        <button type="submit">Place Order</button>
      </form>
    </section>

    <!-- ACCOUNT -->
    <section class="panel hidden" id="account-panel">
      <h2>Account</h2>
    </section>

    <!-- SETTINGS -->
    <section class="panel hidden" id="settings-panel">
      <h2>Settings</h2>
    </section>

    <!-- MESSENGER -->
    <section class="panel hidden" id="messenger-panel">
      <h2>Messenger</h2>
    </section>

    <!-- ✅ FIXED ADMIN PANEL (NOW INSIDE BODY) -->
    <section id="admin-panel" class="panel hidden">
      <h2>Admin Dashboard</h2>

      <button onclick="loadAdminProducts()">Load All Products</button>
      <button onclick="loadPendingProducts()">Pending Only</button>

      <div id="admin-products-container"></div>
    </section>

  </main>

  <!-- MOBILE NAV -->
  <nav class="mobile-bottom-nav">
    <button onclick="switchView('home')">🏠 Home</button>
    <button onclick="switchView('shop')">🛍️ Shop</button>
    <button onclick="switchView('account')">👤 Account</button>
    <button onclick="switchView('messenger')">💬 Chat</button>
  </nav>

  <footer class="site-footer">
    <p>Built for businesses and customers</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
